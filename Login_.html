<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="Login_.css">
</head>
<body>

  <div class="main-container">
    <div class="login-card">

      <!--_______________________________________________________________ Header _________________________________________________- -->
      <div class="header">
        <h1>Login</h1>ko
        <h3>Sign in to your account</h3>
      </div>

      <!--___________ko_____________________________________________________ Form ______________________________________________________ -->
      <div class="form-container">
        <form>

          <!-- ___________________________________________________Email Section Input Work____________________________________________  -->
          <div class="form-group">
            <label>Email</label>
            <input type="text" placeholder="Enter Your Email " class="input-field">
          </div>

          <!--______________________________________________ Phone Number Section Input Work Here _____________________________________  -->
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter Phone Number" class="input-field">
          </div>

          <!-- _________________________________________________________Password Section________________________________________________  -->
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" class="input-field">
          </div>

          <!-- __________________________________________________________Login Button____________________________________________________ -->
          <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- ____________________________________________________________Bottom Buttons___________________________________________________ -->
        <div class="action-buttons">
          <button class="reset-btn">Reset Password</button>
          <button onclick="window.location.href='3_1_Register_.html'" class="create-btn">Create New Account</button>
        </div>
      </div>

    </div>
  

    <!--_________________________________________________________________RIGHT SIDE IMAGE____________________________________________________ -->
    <div class="image-section">
      <div class="overlay">
        <h2>Helping Truck Drivers on Every Road</h2>
        <p>Find mechanics, fuel & emergency help instantly.</p>
      </div>
    </div>

  </div>

  

</body>
</html>
